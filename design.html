<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- set css -->
    <link rel="stylesheet" href="./Css/ResetStyle.css">
    <link rel="stylesheet" href="./Css/Style.css">

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <title>Design Viewr</title>
</head>
<body class="noto model_page">
    <header>
        <a href="./index.html#design" class="back_button">
            ← Back
        </a>
        <h1 id="modelTitle"></h1>
    </header>
    
    <div class="content">

        <model-viewer id="modelViewer" camera-controls shadow-intensity="1"></model-viewer>
    
        <div class="modelInfo">
            <dl>
                <dt>Software</dt>
                <dd id="software"></dd>
                <dt>Period</dt>
                <dd id="period"></dd>
                <dt>Polygon</dt>
                <dd id="polygon"></dd>
            </dl>
        </div>
    </div>


    <script>
        const models =
        {
            pochi:
            {
                _title: "Pochi",
                _src: "./Models/Pochi.glb",
                _software: "Blender",
                _period: "1 Day",
                _polygon: "15,000"
            },

        };

        const params = new URLSearchParams(location.search);
        const id = params.get("id");

        const model = models[id];

        if(model)
        {
            document.getElementById("modelTitle").textContent = model._title;
            document.getElementById("modelViewer").src = model._src;
            document.getElementById("software").textContent = model._software;
            document.getElementById("period").textContent = model._period;
            document.getElementById("polygon").textContent = model._polygon;
        }
        else
        {
            document.getElementById("modelTitle").textContent = "Model Not Found";
        }
    </script>

    <footer>

    </footer>
</body>
</html>
