<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Viewer</title>

    <script
    type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>

    <style>
        body
        {
            margin: 0;
            background: #E5E3DC;
            font-family: "Poppins", sans-serif;
        }

        h1
        {
            text-align: center;
            margin: 20px 0;
        }

        model-viewer
        {
            width: 100%;
            height: 80vh;
        }

        .back_button
        {
            position: fixed;
            top: 20px;
            left: 20px;

            padding: 10px 20px;

            background: #171A20;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <a href="./index.html" class="back_button">
        ← Back
    </a>

    <h1 id="modelTitle"></h1>

    <model-viewer
        id="modelViewer"
        camera-controls
        shadow-intensity="1"
        exposure="1.2"
        environment-image="neutral">
    </model-viewer>

    <script>
        const models =
        {
            pochi:
            {
                title: "Pochi",
                src: "../Models/Pochi.glb"
            },

            sword:
            {
                title: "Sword",
                src: "../Models/Sword.glb"
            },

            house:
            {
                title: "House",
                src: "../Models/House.glb"
            }
        };

        const params = new URLSearchParams(location.search);
        const id = params.get("id");

        const model = models[id];

        if(model)
        {
            document.getElementById("modelTitle").textContent = model.title;
            document.getElementById("modelViewer").src = model.src;
        }
        else
        {
            document.getElementById("modelTitle").textContent = "Model Not Found";
        }
    </script>

</body>
</html>
